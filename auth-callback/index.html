<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSUGI — Confirmation</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192.png">
<link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --void: #0b0b0f; --panel: #17171d; --panel-raised: #1f1f28; --line: #2a2a35;
    --ink: #f2f2f5; --ink-dim: #b4b4c0; --ink-faint: #7d7d8a; --seal: #e3402c; --green: #3ecf8e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --void: #f7f7f9; --panel: #ffffff; --panel-raised: #f0f0f3; --line: #e2e2e8;
      --ink: #16161c; --ink-dim: #48485a; --ink-faint: #7d7d8a; --seal: #d6341f; --green: #1a9c68;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--void); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6; padding: 24px;
  }
  .card {
    max-width: 420px; width: 100%; background: var(--panel); border: 1px solid var(--line);
    border-radius: 20px; padding: 40px 32px; text-align: center;
  }
  .brand { display: flex; align-items: baseline; justify-content: center; gap: 2px; font-weight: 900; font-size: 26px; margin-bottom: 24px; }
  .brand .dot { color: var(--seal); }
  .icon { width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .icon.ok { background: rgba(62,207,142,0.14); }
  .icon.warn { background: rgba(226,64,45,0.14); }
  .icon svg { width: 28px; height: 28px; }
  h1 { font-size: 20px; font-weight: 800; margin: 0 0 10px; }
  p.desc { color: var(--ink-dim); font-size: 14.5px; margin: 0 0 28px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    font-family: inherit; font-size: 15px; font-weight: 700; padding: 14px 22px; border-radius: 12px;
    text-decoration: none; border: none; cursor: pointer; background: var(--seal); color: #fff;
  }
  .btn-ghost { background: transparent; color: var(--ink-dim); border: 1px solid var(--line); margin-top: 10px; }
  .fallback { display: none; margin-top: 18px; font-size: 13px; color: var(--ink-faint); }
  .fallback a { color: var(--seal); text-decoration: none; font-weight: 600; }
  #loading { color: var(--ink-faint); font-size: 13px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span>TSUGI</span><span class="dot">.</span></div>
    <div id="content">
      <p id="loading">Vérification…</p>
    </div>
  </div>

<script>
(function () {
  var PLAY_URL = "https://play.google.com/store/apps/details?id=app.tsugi.android";
  var raw = window.location.hash ? window.location.hash.slice(1) : window.location.search.slice(1);
  var params = {};
  raw.split("&").forEach(function (pair) {
    if (!pair) return;
    var idx = pair.indexOf("=");
    if (idx <= 0) return;
    params[decodeURIComponent(pair.slice(0, idx))] = decodeURIComponent(pair.slice(idx + 1).replace(/\+/g, " "));
  });

  var content = document.getElementById("content");
  var type = params.type;
  var hasToken = !!params.access_token;
  var hasError = !!params.error;

  function render(iconClass, iconSvg, title, desc, deepLink) {
    var html = '<div class="icon ' + iconClass + '">' + iconSvg + '</div>' +
      '<h1>' + title + '</h1>' +
      '<p class="desc">' + desc + '</p>';
    if (deepLink) {
      html += '<a class="btn" id="open-app" href="' + deepLink + '">Ouvrir l\'app TSUGI</a>' +
        '<div class="fallback" id="fallback">L\'app ne s\'est pas ouverte&nbsp;? <a href="' + PLAY_URL + '" target="_blank" rel="noopener">Télécharger TSUGI</a></div>';
    } else {
      html += '<a class="btn" href="' + PLAY_URL + '" target="_blank" rel="noopener">Ouvrir TSUGI</a>';
    }
    content.innerHTML = html;

    if (deepLink) {
      var opened = false;
      window.addEventListener("blur", function () { opened = true; });
      document.addEventListener("visibilitychange", function () { if (document.hidden) opened = true; });
      setTimeout(function () { window.location.href = deepLink; }, 150);
      setTimeout(function () {
        if (!opened) document.getElementById("fallback").style.display = "block";
      }, 1800);
      document.getElementById("open-app").addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      });
    }
  }

  var OK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="#3ecf8e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var WARN_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="#e3402c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v5M12 16h.01M10.3 3.9L2.5 17a1.5 1.5 0 0 0 1.3 2.2h16.4a1.5 1.5 0 0 0 1.3-2.2L13.7 3.9a1.5 1.5 0 0 0-2.6 0Z"/></svg>';

  if (hasError) {
    render("warn", WARN_ICON, "Lien invalide ou expiré",
      "Ce lien n'est plus valable. Relancez la demande depuis l'app.", null);
  } else if (type === "recovery" && hasToken) {
    render("ok", OK_ICON, "Identité vérifiée",
      "Ouvrez l'app pour définir votre nouveau mot de passe.",
      "https://tsugi.stud-in.be/reset-password#" + raw);
  } else if (type === "magiclink" && hasToken) {
    render("ok", OK_ICON, "Vous êtes connecté(e) !",
      "Ouvrez l'app pour retrouver votre compte.",
      "https://tsugi.stud-in.be/auth-callback#" + raw);
  } else if (hasToken) {
    render("ok", OK_ICON, "Compte confirmé !",
      "Votre adresse email est vérifiée. Vous pouvez maintenant vous connecter dans l'app.",
      "https://tsugi.stud-in.be/auth-callback#" + raw);
  } else {
    render("warn", WARN_ICON, "Rien à confirmer ici",
      "Ouvrez ce lien depuis l'email que TSUGI vous a envoyé.", null);
  }
})();
</script>
</body>
</html>
